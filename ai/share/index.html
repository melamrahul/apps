<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Personal AI – Shared Chat</title>
<meta property="og:title" content="Personal AI – Shared Chat"/>
<meta property="og:description" content="View a shared conversation from Personal AI"/>
<meta name="theme-color" content="#10A37F"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:"DM Sans",system-ui,sans-serif;background:#0a0a0a;color:#fff;line-height:1.5}
/* ── Top bar ── */
.topbar{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid #1e1e1e;background:#000;position:sticky;top:0;z-index:10}
.logo{font-size:18px;font-weight:700;flex:1}
.logo span{color:#10A37F}
.share-badge{font-size:11px;font-weight:600;background:#10A37F22;color:#10A37F;border:1px solid #10A37F44;border-radius:20px;padding:3px 10px;letter-spacing:.4px}
/* ── Content ── */
.wrap{max-width:740px;margin:0 auto;padding:20px 16px 60px}
/* ── Loading / error ── */
.state-box{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:14px;text-align:center;color:#666}
.spinner{width:32px;height:32px;border:3px solid #222;border-top-color:#10A37F;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.err-icon{font-size:40px}
.err-title{font-size:18px;font-weight:600;color:#fff}
.err-body{font-size:14px;color:#666;max-width:300px;line-height:1.6}
/* ── Conversation header ── */
.conv-header{margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid #1e1e1e}
.conv-title{font-size:18px;font-weight:700;color:#fff;margin-bottom:4px}
.conv-meta{font-size:12px;color:#555}
/* ── Highlight target message ── */
.msg-highlight{animation:highlightPulse 2s ease-out forwards}
@keyframes highlightPulse{0%{outline:2px solid #10A37F;outline-offset:4px;border-radius:12px}100%{outline:2px solid transparent;outline-offset:4px}}
/* ── Message rows ── */
.mr{display:flex;flex-direction:column;gap:3px;padding:4px 0}
.mr.user{align-items:flex-end}
.mr.ai{align-items:flex-start}
.ub{max-width:min(300px,82%);background:#2C2C2C;color:#fff;padding:11px 15px;border-radius:20px 20px 5px 20px;font-size:15px;line-height:1.6;word-break:break-word;white-space:pre-wrap}
.mtime{font-size:11px;color:#555;padding:0 3px}
.aibw{max-width:min(720px,100%)}
.aibody{font-size:15px;line-height:1.75;color:#e8e8e8}
/* ── Rich content (same as index.html) ── */
.rp{font-size:15px;line-height:1.75;margin:2px 0}
.ric{font-family:"JetBrains Mono",monospace;font-size:13px;background:#2D2D2D;padding:2px 5px;border-radius:4px;color:#E06C75}
.rlink{color:#10A37F;text-decoration:underline}
a{color:#10A37F}
.rhr{border:none;border-top:1px solid #1e1e1e;margin:10px 0}
.rul,.rol{padding-left:0;margin:4px 0;display:flex;flex-direction:column;gap:6px;list-style:none}
.rul li,.rol li{display:flex;align-items:flex-start;gap:0}
.bull-dot{color:#10A37F;font-size:18px;width:22px;flex-shrink:0;padding-top:2px;line-height:1.5}
.bull-sub-dot{color:#10A37F;font-size:15px;width:22px;flex-shrink:0;padding-top:2px;opacity:.7;line-height:1.5}
.num-idx{color:#10A37F;font-size:15px;font-weight:600;width:28px;flex-shrink:0;padding-top:2px}
.bull-nested{margin-left:20px;display:flex;flex-direction:column;gap:4px;margin-top:4px}
.bull-nested-item{display:flex;align-items:flex-start}
.rbq{display:flex;border-radius:0 8px 8px 0;overflow:hidden;margin:4px 0}
.rbq-bar{width:4px;flex-shrink:0;background:#10A37F}
.rbq-text{padding:10px 14px;font-style:italic;font-size:14px;line-height:22px;background:#10A37F0F;color:rgba(255,255,255,.85)}
.bnote{border-radius:10px;overflow:hidden;margin:5px 0;display:flex}
.bnote-bar{width:4px;flex-shrink:0}
.bnote-inner{padding:11px 12px;display:flex;gap:10px;align-items:flex-start;flex:1}
.bnote-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.bnote-type{font-size:11px;font-weight:700;letter-spacing:.8px;margin-bottom:3px}
.bnote-text{font-size:14px;line-height:21px;color:#fff}
.bcode,.bterm{background:#0D0D0D;border-radius:12px;overflow:hidden;border:1px solid #1E1E1E;margin:6px 0}
.bhead{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:rgba(255,255,255,.04)}
.mdots{display:flex;align-items:center;gap:5px}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot.r{background:#FF5F57}.dot.y{background:#FFBD2E}.dot.g{background:#28C840}
.lbadge{font-size:12px;font-weight:600;margin-left:8px;font-family:"JetBrains Mono",monospace}
.lcount{font-size:11px;color:#666;margin-right:4px}
.cbtn{background:none;border:1px solid #444;border-radius:5px;color:#aaa;cursor:pointer;font-size:11px;padding:3px 9px;font-family:"DM Sans",sans-serif;transition:all .15s}
.cbtn:hover{background:#2A2A2A;color:#fff;border-color:#666}
.code-wrap{display:flex;overflow-x:auto}
.line-nums{background:#111;padding:12px 8px 12px 10px;text-align:right;flex-shrink:0;user-select:none}
.line-nums span{display:block;font-family:"JetBrains Mono",monospace;font-size:12px;line-height:20px;color:#4A4A4A}
.code-inner{padding:12px 14px 12px 10px;flex:1}
.codeBody{font-family:"JetBrains Mono",monospace;font-size:13px;line-height:20px;color:#D4D4D4;margin:0;white-space:pre}
.bterm{border:1px solid #333}
.term-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#1A1A1A}
.termBody{font-family:"JetBrains Mono",monospace;font-size:13px;line-height:20px;padding:12px 14px;overflow-x:auto;margin:0;white-space:pre;color:#D4D4D4}
.term-prompt{color:#4EC9B0}
.bnum{border-radius:14px;overflow:hidden;margin:5px 0}
.num-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px}
.num-label{font-size:12px;font-weight:700;letter-spacing:.5px}
.num-divider{height:1px;margin:0}
.num-val{font-family:"JetBrains Mono",monospace;font-weight:700;text-align:center;padding:24px 20px;letter-spacing:2px;overflow-x:auto;white-space:nowrap}
.bemail{border:1px solid rgba(124,124,255,.25);border-radius:14px;overflow:hidden;margin:5px 0}
.email-purpose{background:rgba(124,124,255,.12);padding:9px 14px;font-size:12px;font-weight:700;color:#7C7CFF;display:flex;align-items:center;gap:6px}
.email-divider{height:1px;background:rgba(124,124,255,.2)}
.email-sec{padding:10px 14px;background:#16162A}
.email-sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.email-sec-label{font-size:11px;font-weight:700;color:#7C7CFF;letter-spacing:.5px}
.email-subj{font-size:15px;font-weight:600;color:#fff}
.email-body-text{font-size:14px;line-height:22px;color:#fff;white-space:pre-wrap}
.bkv{border-radius:12px;overflow:hidden;margin:5px 0}
.kv-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px}
.kv-hdr-label{font-size:12px;font-weight:700;letter-spacing:.5px}
.kv-divider{height:1px}
.kv-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px}
.kv-key{font-size:13px;flex:1;color:#888}
.kv-val{font-size:13px;font-weight:500;text-align:right;flex:1.5;color:#fff}
.bstep{border-radius:12px;overflow:hidden;margin:5px 0}
.step-row{display:flex;align-items:flex-start;gap:12px;padding:12px 14px}
.step-badge{width:24px;height:24px;border-radius:50%;background:#10A37F;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;margin-top:1px}
.step-divider{height:1px}
.btbw{overflow-x:auto;margin:5px 0;border-radius:10px;border:1px solid #1e1e1e}
.rtbl{border-collapse:collapse;width:100%}
.rtbl th,.rtbl td{padding:9px 12px;text-align:left;font-size:13px;border:.5px solid #1e1e1e}
.rtbl th{background:#252525;font-weight:600}
.rtbl tr:nth-child(even) td{background:#1C1C1C}
.bcklist{background:#1C1C1C;border:1px solid #2C2C2C;border-radius:9px;padding:11px;display:flex;flex-direction:column;gap:7px;margin:5px 0}
.ck-row{display:flex;align-items:center;gap:9px;font-size:14px}
.ck-box{font-size:19px;flex-shrink:0;line-height:1;color:#10A37F}
.blink{border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px;margin:5px 0;text-decoration:none;background:#1A1A2E;border:1px solid #10A37F40;color:#10A37F}
.blink-icon{font-size:16px;flex-shrink:0}
.blink-url{font-size:14px;text-decoration:underline;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.blink-ext{font-size:12px;opacity:.6;flex-shrink:0}
.bmath{border-radius:10px;overflow:hidden;margin:5px 0}
.math-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 14px}
.math-label{font-size:11px;font-weight:700;letter-spacing:.5px}
.math-divider{height:1px}
.math-body{font-family:"JetBrains Mono",monospace;font-size:16px;text-align:center;padding:16px;color:#fff}
.bdef{border-radius:10px;padding:12px 14px;margin:5px 0;display:flex;flex-direction:column;gap:4px}
.def-term{font-size:13px;font-weight:700}
.def-body{font-size:14px;line-height:21px;color:#fff}
/* ── Footer ── */
.footer{text-align:center;margin-top:32px;padding:16px;border-top:1px solid #1e1e1e;font-size:12px;color:#444}
.footer a{color:#10A37F;text-decoration:none}
/* ── Copy btn global ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="logo">Personal <span>AI</span></div>
  <div class="share-badge">Shared Chat</div>
</div>

<!-- Main content -->
<div class="wrap">
  <!-- Loading state -->
  <div class="state-box" id="loading-state">
    <div class="spinner"></div>
    <div style="color:#555;font-size:14px">Loading conversation…</div>
  </div>

  <!-- Error state -->
  <div class="state-box" id="error-state" style="display:none">
    <div class="err-icon">🔗</div>
    <div class="err-title">Chat not found</div>
    <div class="err-body">This shared link may be invalid or the conversation may have been deleted.</div>
  </div>

  <!-- Conversation -->
  <div id="conv-view" style="display:none">
    <div class="conv-header">
      <div class="conv-title" id="conv-title"></div>
      <div class="conv-meta" id="conv-meta"></div>
    </div>
    <div id="messages"></div>
  </div>

  <div class="footer">
    Shared from <a href="https://melamrahul.github.io/apps/ai/">Personal AI</a> · Powered by Cohere + Pinecone
  </div>
</div>

<script>
// ── Helpers ───────────────────────────────────────────────────────────────
function _esc(t){ return String(t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function _fmtDate(ts){
  const d=new Date(ts),n=new Date();
  return d.toDateString()===n.toDateString()
    ? d.toLocaleTimeString([],{hour:"numeric",minute:"2-digit"})
    : d.toLocaleDateString([],{month:"short",day:"numeric",year:"numeric"})+" · "+d.toLocaleTimeString([],{hour:"numeric",minute:"2-digit"});
}

const _cpMap={};
window._cpk=function(btn){
  const k=btn.closest("[data-cpk]")?.dataset.cpk;
  if(k&&_cpMap[k])navigator.clipboard.writeText(_cpMap[k]).then(()=>_toast("Copied!"));
};
function _mkk(text){const k=Math.random().toString(36).slice(2);_cpMap[k]=text;return k;}

function _toast(msg){
  const t=document.createElement("div");
  Object.assign(t.style,{position:"fixed",bottom:"24px",left:"50%",transform:"translateX(-50%) translateY(12px)",background:"#1C1C1C",color:"#fff",border:"1px solid #333",borderRadius:"8px",padding:"7px 15px",fontSize:"13px",zIndex:"9999",opacity:"0",transition:"all .22s",pointerEvents:"none",whiteSpace:"nowrap"});
  t.textContent=msg; document.body.appendChild(t);
  requestAnimationFrame(()=>{t.style.opacity="1";t.style.transform="translateX(-50%) translateY(0)";});
  setTimeout(()=>{t.style.opacity="0";setTimeout(()=>t.remove(),300);},2000);
}

// ── Inline renderer (identical logic to index.html) ───────────────────────
const ACCENT = "#10A37F";

function _inline(text){
  return text
    .replace(/\*\*([^*\n]+)\*\*/g,"<strong>$1</strong>")
    .replace(/\*([^*\n]+)\*/g,"<em>$1</em>")
    .replace(/~~([^~\n]+)~~/g,"<del>$1</del>")
    .replace(/__([^_\n]+)__/g,"<u>$1</u>")
    .replace(/`([^`\n]+)`/g,'<code class="ric">$1</code>')
    .replace(/(https?:\/\/[^\s<>"]+)/g,'<a href="$1" target="_blank" rel="noopener" class="rlink">$1</a>')
    .replace(/\n/g,"<br/>");
}

const LC={python:"#3572A5",kotlin:"#7F52FF",java:"#B07219",javascript:"#F1E05A",js:"#F1E05A",typescript:"#2B7489",ts:"#2B7489",html:"#E34C26",css:"#563D7C",bash:"#89E051",shell:"#89E051",sh:"#89E051",json:"#CB7A1E",xml:"#0060AC",sql:"#E38C00",c:"#555555","c++":"#6495ED",cpp:"#6495ED",arduino:"#00878A",ino:"#00878A",rust:"#DEA584",go:"#00ADD8",swift:"#FA7343",dart:"#0175C2",php:"#4F5D95",ruby:"#CC342D",rb:"#CC342D"};
function lc(l){return LC[l.toLowerCase()]||"#888";}

const KW={
  python:/\b(def|return|if|elif|else|for|while|import|from|class|lambda|pass|break|continue|in|is|not|and|or|True|False|None|try|except|finally|raise|with|as|yield|async|await)\b/g,
  kotlin:/\b(fun|val|var|class|object|interface|enum|sealed|data|return|if|else|when|for|while|in|is|as|try|catch|finally|throw|import|package|override|open|abstract|null|true|false|Unit|String|Int|Long|Boolean|List|Map)\b/g,
  java:/\b(public|private|protected|static|final|class|interface|enum|extends|implements|return|if|else|for|while|do|switch|case|break|continue|new|void|int|long|boolean|null|true|false)\b/g,
  javascript:/\b(function|return|if|else|for|while|do|let|const|var|class|extends|import|export|default|async|await|try|catch|null|undefined|true|false)\b/g,
  php:/\b(echo|print|function|return|if|else|for|foreach|while|class|new|null|true|false)\b/g,
  sql:/\b(SELECT|FROM|WHERE|JOIN|LEFT|RIGHT|ON|AS|AND|OR|NOT|IN|LIKE|IS|NULL|GROUP|BY|ORDER|HAVING|LIMIT|INSERT|INTO|VALUES|UPDATE|SET|DELETE|CREATE|TABLE|DROP)\b/gi,
  c:/\b(int|float|double|char|void|bool|long|short|unsigned|const|static|struct|return|if|else|for|while|switch|case|break|sizeof)\b/g,
};
KW.cpp=KW.c; KW.arduino=KW.c; KW.ino=KW.c; KW.ts=KW.javascript; KW.typescript=KW.javascript;

const SC={
  python:{kw:"#CC99CD",fn:"#DCDCAA",str:"#CE9178",num:"#B5CEA8",cmt:"#6A9955",type:"#4EC9B0"},
  kotlin:{kw:"#CC7832",fn:"#FFC66D",str:"#6A8759",num:"#6897BB",cmt:"#808080",type:"#BBB529"},
  java:{kw:"#CC7832",fn:"#FFC66D",str:"#6A8759",num:"#6897BB",cmt:"#808080",type:"#BBB529"},
};
const DSC={kw:"#CC99CD",fn:"#DCDCAA",str:"#CE9178",num:"#B5CEA8",cmt:"#6A9955",type:"#4EC9B0"};

function _syntaxHL(code,lang){
  let o=_esc(code); const l2=lang.toLowerCase();
  const sc=SC[l2]||DSC, kw=KW[l2]||KW.javascript;
  o=o.replace(/\b([A-Z][a-zA-Z0-9_]+)\b/g,`<span style="color:${sc.type}">$1</span>`);
  o=o.replace(/\b(\d+\.?\d*)\b/g,`<span style="color:${sc.num}">$1</span>`);
  o=o.replace(/(&quot;[^]*?&quot;|&#39;[^]*?&#39;)/g,`<span style="color:${sc.str}">$1</span>`);
  if(l2==="html"){o=o.replace(/(&lt;\/?)([\w]+)/g,`$1<span style="color:#569CD6">$2</span>`);}
  else{o=o.replace(kw,m=>`<span style="color:${sc.kw};font-weight:600">${m}</span>`);}
  o=o.replace(/\b([a-zA-Z_][a-zA-Z0-9_]*)(?=\s*\()/g,`<span style="color:${sc.fn}">$1</span>`);
  o=o.replace(/(\/\/[^\n]*|#[^\n]*)/g,`<span style="color:${sc.cmt};font-style:italic">$1</span>`);
  return o;
}

function _renderRich(raw){
  const lines=raw.split("\n"); let out="",i=0;
  while(i<lines.length){
    const line=lines[i],tr=line.trim();
    if(!tr){i++;continue;}

    // Code block
    if(tr.startsWith("```")){
      const lang=tr.slice(3).trim()||"code"; const cl=[]; i++;
      while(i<lines.length&&!lines[i].trimStart().startsWith("```")){cl.push(lines[i]);i++;}
      const code=cl.join("\n"); const k=_mkk(code);
      const isT=["bash","shell","sh","terminal","command","zsh","cmd","powershell","fish"].includes(lang.toLowerCase());
      if(isT){
        const tl=lang==="powershell"?"PowerShell":"Terminal";
        const pl=code.split("\n").map(l=>`<span class="term-prompt">$ </span>${_esc(l)}`).join("\n");
        out+=`<div class="bterm" data-cpk="${k}"><div class="term-hdr"><div class="mdots"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span style="margin-left:8px;color:#888;font-size:12px">${tl}</span></div><button class="cbtn" onclick="_cpk(this)">Copy</button></div><pre class="termBody">${pl}</pre></div>`;
      } else {
        const lca=lc(lang); const la=lc(lang); const lns=code.split("\n");
        const hasL=lns.length>1;
        const nums=hasL?`<div class="line-nums">${lns.map((_,n)=>`<span>${n+1}</span>`).join("")}</div>`:"";
        out+=`<div class="bcode" style="border:1px solid ${la}4D" data-cpk="${k}"><div class="bhead" style="background:${la}1A"><div class="mdots"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span style="width:8px;height:8px;border-radius:50%;background:${la};display:inline-block;margin-left:6px"></span><span class="lbadge" style="color:${la}">${lang.toLowerCase()||"code"}</span></div><div style="display:flex;align-items:center;gap:8px">${hasL?`<span class="lcount">${lns.length} lines</span>`:""}<button class="cbtn" onclick="_cpk(this)">Copy</button></div></div><div class="code-wrap">${nums}<div class="code-inner"><pre class="codeBody"><code>${_syntaxHL(code,lang)}</code></pre></div></div></div>`;
      }
      i++;continue;
    }

    // Headings (#)
    if(tr.startsWith("#")){
      const lv=Math.min(tr.match(/^#+/)[0].length,6);
      const txt=tr.replace(/^#+\s*/,"");
      const sz=["","21px","18px","16px","14px","14px","13px"];
      const wt=["","700","700","600","600","600","500"];
      out+=`<div style="font-size:${sz[lv]};font-weight:${wt[lv]};margin:${lv<=2?"12px":"9px"} 0 3px;${lv<=2?"border-bottom:1px solid #1e1e1e;padding-bottom:4px":""};color:#fff">${_inline(txt)}</div>`;
      i++;continue;
    }

    // Emoji heading
    const emojiRx=/^[\u{1F300}-\u{1FFFF}\u2600-\u27BF✅☑✓→◆■▶]/u;
    if(emojiRx.test(tr)&&tr.length<120&&!tr.match(/^[-*•] /)){
      out+=`<div style="font-size:17px;font-weight:700;margin:12px 0 4px;color:#fff">${_inline(tr)}</div>`;
      i++;continue;
    }

    // Bold-only heading
    if(/^\*\*[^*]+\*\*$/.test(tr)){
      out+=`<div style="font-size:17px;font-weight:700;margin:12px 0 4px;border-bottom:1px solid #1e1e1e;padding-bottom:4px;color:#fff">${_inline(tr.slice(2,-2))}</div>`;
      i++;continue;
    }

    // Blockquote / Note
    if(tr.startsWith("> ")){
      const bqls=[]; while(i<lines.length&&lines[i].trimStart().startsWith("> ")){bqls.push(lines[i].trimStart().slice(2));i++;}
      const txt=bqls.join("\n");
      const NTS=["Note","Warning","Tip","Error","Success","Info"];
      const nt=NTS.find(t=>txt.startsWith(t+":"));
      if(nt){
        const ic={Note:"ℹ️",Warning:"⚠️",Tip:"💡",Error:"❌",Success:"✅",Info:"ℹ️"};
        const nc={Note:"#3B82F6",Warning:"#F59E0B",Tip:"#3B82F6",Error:"#EF4444",Success:"#10B981",Info:"#06B6D4"};
        out+=`<div class="bnote" style="background:${nc[nt]}18;border:1px solid ${nc[nt]}40"><div class="bnote-bar" style="background:${nc[nt]}"></div><div class="bnote-inner"><span class="bnote-icon">${ic[nt]}</span><div><div class="bnote-type" style="color:${nc[nt]}">${nt.toUpperCase()}</div><div class="bnote-text">${_inline(txt.slice(nt.length+1).trim())}</div></div></div></div>`;
      } else {
        out+=`<div class="rbq"><div class="rbq-bar"></div><div class="rbq-text">${_inline(txt)}</div></div>`;
      }
      continue;
    }

    // Table
    if(tr.startsWith("|")&&tr.includes("|")){
      const rows=[]; while(i<lines.length&&lines[i].trimStart().startsWith("|")){const cells=lines[i].trim().split("|").filter(c=>c.trim()).map(c=>c.trim());if(cells.length&&!cells.every(c=>/^[-:]+$/.test(c)))rows.push(cells);i++;}
      if(rows.length){out+=`<div class="btbw"><table class="rtbl">${rows.map((row,ri)=>`<tr>${row.map(cell=>ri===0?`<th>${_inline(cell)}</th>`:`<td>${_inline(cell)}</td>`).join("")}</tr>`).join("")}</table></div>`;}
      continue;
    }

    // Checklist
    if(tr.match(/^[☐☑]/)||tr.match(/^-\s*\[[ xX]\]/)){
      const items=[]; while(i<lines.length){const l2=lines[i].trim();if(l2.startsWith("☐")){items.push({t:l2.slice(1).trim(),c:false});i++;}else if(l2.startsWith("☑")){items.push({t:l2.slice(1).trim(),c:true});i++;}else if(l2.match(/^-\s*\[[ ]\]/)){items.push({t:l2.replace(/^-\s*\[[ ]\]\s*/,""),c:false});i++;}else if(l2.match(/^-\s*\[[xX]\]/)){items.push({t:l2.replace(/^-\s*\[[xX]\]\s*/,""),c:true});i++;}else break;}
      out+=`<div class="bcklist">${items.map(it=>`<div class="ck-row"><span class="ck-box">${it.c?"☑":"☐"}</span><span style="font-size:14px;${it.c?"text-decoration:line-through;opacity:.6":""}">${_inline(it.t)}</span></div>`).join("")}</div>`;
      continue;
    }

    // Bullet list
    if(tr.match(/^[-*•] /)){
      const items=[]; while(i<lines.length){const curr=lines[i],ct=curr.trim();if(ct.match(/^[-*•] /)){items.push({type:"item",text:ct.replace(/^[-*•] /,"")});i++;}else if(curr.startsWith("  ")&&curr.trimStart().match(/^[-*•] /)){const nested=[];while(i<lines.length&&lines[i].startsWith("  ")){nested.push(lines[i].trimStart().replace(/^[-*•] /,""));i++;}items.push({type:"nested",items:nested});}else break;}
      out+=`<ul class="rul">${items.map(it=>it.type==="item"?`<li><span class="bull-dot">•</span><span style="font-size:15px;line-height:1.65">${_inline(it.text)}</span></li>`:`<li style="flex-direction:column"><div class="bull-nested">${it.items.map(sub=>`<div class="bull-nested-item"><span class="bull-sub-dot">◦</span><span style="font-size:14px;line-height:1.65;opacity:.85">${_inline(sub)}</span></div>`).join("")}</div></li>`).join("")}</ul>`;
      continue;
    }

    // Numbered list / Step block
    if(tr.match(/^\d+[.)]\s/)){
      const items=[tr.replace(/^\d+[.)]\s*/,"")]; i++;
      while(i<lines.length&&lines[i].trim().match(/^\d+[.)]\s/)){items.push(lines[i].trim().replace(/^\d+[.)]\s*/,""));i++;}
      const isStep=items.length>=2&&items.every(it=>it.length>8&&/^[A-Z]/.test(it));
      if(isStep){
        out+=`<div class="bstep" style="background:#1C1C1C;border:1px solid #2C2C2C">${items.map((step,idx)=>`<div class="step-row"><div class="step-badge">${idx+1}</div><span style="font-size:15px;line-height:1.65;color:#fff">${_inline(step)}</span></div>${idx<items.length-1?'<div class="step-divider" style="background:#2C2C2C"></div>':""}`).join("")}</div>`;
      } else {
        out+=`<ol class="rol">${items.map((it,idx)=>`<li><span class="num-idx">${idx+1}.</span><span style="font-size:15px;line-height:1.65">${_inline(it)}</span></li>`).join("")}</ol>`;
      }
      continue;
    }

    // HR
    if(tr.match(/^(---|___|\*\*\*)$/)){out+=`<hr class="rhr"/>`;i++;continue;}

    // Number block
    const nm=tr.match(/^([A-Za-z ]{2,30}[:\s]+)?([₹$€£¥]?[\d,]+\.?\d*\s?(?:km|kg|%|USD|INR|EUR)?)$/i);
    if(nm&&tr.length<40){
      const label=(nm[1]||"Result").trim().replace(/:$/,""),num=(nm[2]||tr).trim();
      const len=num.length,fs=len<=8?40:len<=12?32:len<=16?24:18;
      const k=_mkk(num);
      out+=`<div class="bnum" style="background:#1A1A2E;border:1px solid ${ACCENT}4D" data-cpk="${k}"><div class="num-hdr" style="background:${ACCENT}1A"><span class="num-label" style="color:${ACCENT}">${_esc(label.toUpperCase())}</span><button class="cbtn" onclick="_cpk(this)">Copy</button></div><div class="num-divider" style="background:${ACCENT}4D"></div><div class="num-val" style="font-size:${fs}px;color:${ACCENT}">${_esc(num)}</div></div>`;
      i++;continue;
    }

    // ID in prose
    const idm=tr.match(/(?:number|ID|OTP|code|PIN|tracking|order|invoice)\*?\s*(?:is|:|=)\s*\*?"?'?([A-Z0-9][\w\-]{1,30})(?=[\s.,;!?]|$)/i);
    if(idm){
      const num=idm[1],len=num.length,fs=len<=8?32:len<=12?22:len<=16?18:15;
      const k=_mkk(num);
      out+=`<p class="rp">${_inline(tr)}</p><div class="bnum" style="background:#1A1A2E;border:1px solid ${ACCENT}4D" data-cpk="${k}"><div class="num-hdr" style="background:${ACCENT}1A"><span class="num-label" style="color:${ACCENT}">RESULT</span><button class="cbtn" onclick="_cpk(this)">Copy</button></div><div class="num-divider" style="background:${ACCENT}4D"></div><div class="num-val" style="font-size:${fs}px;color:${ACCENT}">${_esc(num)}</div></div>`;
      i++;continue;
    }

    // Email block
    if(tr.toLowerCase().startsWith("subject:")){
      const subject=tr.slice(8).trim();
      const prevMatch=out.match(/<p class="rp">([\s\S]*?)<\/p>\s*$/);
      const purpose=prevMatch?prevMatch[1].replace(/<[^>]+>/g,""):"Email";
      const bodyLns=[]; i++; if(i<lines.length&&!lines[i].trim())i++;
      while(i<lines.length){if(!lines[i].trim()&&i+1<lines.length&&(lines[i+1].startsWith("#")||lines[i+1].startsWith("```")))break;bodyLns.push(lines[i]);i++;}
      const body=bodyLns.join("\n").trim();
      const ks=_mkk(subject),kb=_mkk(body);
      out+=`<div class="bemail"><div class="email-purpose">✉️ <span>${_esc(purpose)}</span></div><div class="email-divider"></div><div class="email-sec" data-cpk="${ks}"><div class="email-sec-hdr"><span class="email-sec-label">SUBJECT</span><button class="cbtn" onclick="_cpk(this)">Copy</button></div><div class="email-subj">${_esc(subject)}</div></div><div class="email-divider"></div><div class="email-sec" data-cpk="${kb}"><div class="email-sec-hdr"><span class="email-sec-label">BODY</span><button class="cbtn" onclick="_cpk(this)">Copy</button></div><div class="email-body-text">${_inline(body)}</div></div></div>`;
      continue;
    }

    // Link block
    if(tr.match(/^https?:\/\/\S+$/)){
      out+=`<a href="${_esc(tr)}" target="_blank" rel="noopener" class="blink"><span class="blink-icon">🔗</span><span class="blink-url">${_esc(tr)}</span><span class="blink-ext">↗</span></a>`;
      i++;continue;
    }

    // Definition
    const defm=tr.match(/^([A-Z][\w\s]{1,30}):\s+([A-Z].{10,})$/);
    if(defm&&!tr.includes("http")&&tr.indexOf(":")<32){
      out+=`<div class="bdef" style="background:${ACCENT}0F;border:1px solid ${ACCENT}33"><span class="def-term" style="color:${ACCENT}">${_esc(defm[1].trim())}</span><span class="def-body">${_inline(defm[2].trim())}</span></div>`;
      i++;continue;
    }

    // Plain paragraph
    const pls=[]; const eRx=/^[\u{1F300}-\u{1FFFF}\u2600-\u27BF✅☑✓→◆■▶]/u;
    while(i<lines.length){
      const l2=lines[i],l2t=l2.trim();
      const isEH=l2t.length<120&&!l2t.match(/^[-*•] /)&&eRx.test(l2t);
      const isBL=/^\*\*[^*]+\*\*$/.test(l2t);
      if(!l2t||l2t.startsWith("```")||l2t.startsWith("|")||l2t.startsWith("#")||l2t.startsWith("> ")||l2t.match(/^[-*•] /)||l2t.match(/^\d+[.)]\s/)||l2t.match(/^(---|___|\*\*\*)$/)||l2t.toLowerCase().startsWith("subject:")||l2t.match(/^[☐☑]/)||l2t.match(/^https?:\/\/\S+$/)||isEH||isBL)break;
      pls.push(l2);i++;
    }
    const pt=pls.join("\n").trim();
    if(pt)out+=`<p class="rp">${_inline(pt)}</p>`;
  }
  return out||`<p class="rp">—</p>`;
}

// ── Firebase load ─────────────────────────────────────────────────────────
const USER_ID   = "rahul_personal_ai";
const params    = new URLSearchParams(window.location.search);
const CONV_ID   = params.get("c");
const TARGET_MSG = params.get("m");  // optional — scroll to specific message

if (!CONV_ID) {
  document.getElementById("loading-state").style.display = "none";
  document.getElementById("error-state").style.display   = "flex";
} else {
  (async () => {
    try {
      const { initializeApp, getApps } = await import("https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js");
      const { getFirestore, doc, getDoc, collection, query, orderBy, getDocs } =
        await import("https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js");

      const cfg = {
        apiKey:            "AIzaSyBboG7Ii4dFYXFzC0KsG5IvXE8nC1WVziA",
        authDomain:        "personal-ai-rahul.firebaseapp.com",
        projectId:         "personal-ai-rahul",
        storageBucket:     "personal-ai-rahul.firebasestorage.app",
        messagingSenderId: "427818640328",
        appId:             "1:427818640328:web:00cbcdd88b667c9b8356fd"
      };

      const app = getApps().length ? getApps()[0] : initializeApp(cfg);
      const db  = getFirestore(app);

      // Load conversation metadata
      const convSnap = await getDoc(doc(db, "users", USER_ID, "conversations", CONV_ID));
      if (!convSnap.exists()) throw new Error("not_found");

      const conv = convSnap.data();

      // Load messages
      const msgsQ  = query(
        collection(db, "users", USER_ID, "conversations", CONV_ID, "messages"),
        orderBy("timestamp", "asc")
      );
      const msgsSnap = await getDocs(msgsQ);
      const msgs = msgsSnap.docs.map(d => d.data()).filter(m => !m.isLoading);

      // Render
      document.getElementById("loading-state").style.display = "none";
      document.getElementById("conv-view").style.display     = "block";
      document.getElementById("conv-title").textContent      = conv.title || "Untitled chat";
      document.getElementById("conv-meta").textContent       =
        msgs.length + " messages · " + new Date(conv.updatedAt).toLocaleDateString([], {month:"long",day:"numeric",year:"numeric"});

      // Build messages HTML
      let h = "";
      msgs.forEach(msg => {
        if (msg.role === "user") {
          h += `<div class="mr user" ${msg.id===TARGET_MSG?'id="target-msg"':""}>
            <div class="ub">${_esc(msg.content)}</div>
            <div class="mtime">${_fmtDate(msg.timestamp)}</div>
          </div>`;
        } else {
          const body = _renderRich(msg.content.replace(/●$/, "").trim());
          const k = _mkk(msg.content);
          const isTarget = msg.id === TARGET_MSG || (TARGET_MSG && msgs.indexOf(msg) === msgs.findIndex(m => m.id === TARGET_MSG) + 1 /* AI reply to target user msg */);
          h += `<div class="mr ai" ${isTarget?'id="target-msg"':""}>
            <div class="aibw">
              <div class="aibody" data-cpk="${k}">${body}</div>
            </div>
          </div>`;
        }
      });
      document.getElementById("messages").innerHTML = h;

      // Scroll to target message if ?m= present
      if (TARGET_MSG) {
        const targetEl = document.getElementById("target-msg");
        if (targetEl) {
          setTimeout(() => {
            targetEl.scrollIntoView({ behavior: "smooth", block: "center" });
            targetEl.classList.add("msg-highlight");
          }, 400);
        }
      }

      // Update page title
      document.title = (conv.title || "Shared Chat") + " – Personal AI";

    } catch(e) {
      console.error(e);
      document.getElementById("loading-state").style.display = "none";
      document.getElementById("error-state").style.display   = "flex";
    }
  })();
}
